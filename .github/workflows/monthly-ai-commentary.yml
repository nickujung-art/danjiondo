name: Monthly AI Commentary Batch

on:
  schedule:
    - cron: '0 20 1 * *'  # 매월 1일 05:00 KST (UTC 20:00)
  workflow_dispatch:
    inputs:
      area_bucket:
        description: 'Area bucket (소형/59/74/84/대형)'
        default: '84'
      limit:
        description: 'Max records (0=all)'
        default: '0'

jobs:
  generate-commentary:
    name: 단지별 AI 코멘트 생성
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate AI Commentary
        run: >-
          npx tsx scripts/generate-complex-commentary.ts
          --area-bucket=${{ github.event.inputs.area_bucket || '84' }}
          --limit=${{ github.event.inputs.limit || '0' }}
          2>&1 | tee commentary-run.log
        env:
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL:    ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:   ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commentary-run-log-${{ github.run_id }}
          path: commentary-run.log
          retention-days: 14
