name: KAPT 단지 시설 정보 적재 (1회성)

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'DEBUG 모드 (첫 3개 raw 응답 확인 후 종료)'
        type: boolean
        default: false
      missing_only:
        description: '이번 달 데이터가 없는 단지만 처리 (중단된 실행 재개용)'
        type: boolean
        default: false

jobs:
  kapt-facility-enrich:
    name: KAPT 단지 시설 정보 적재
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run KAPT facility enrich
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            npx tsx scripts/kapt-facility-enrich.ts --debug
          elif [ "${{ inputs.missing_only }}" = "true" ]; then
            npx tsx scripts/kapt-facility-enrich.ts --missing-only
          else
            npx tsx scripts/kapt-facility-enrich.ts
          fi
        env:
          KAPT_API_KEY: ${{ secrets.KAPT_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
