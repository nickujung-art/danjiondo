name: AI 가격 예측 배치 (Chronos-Bolt-Small)

on:
  schedule:
    # 매일 03:00 KST (UTC 18:00) — Holt-Winters(02:00 KST) 이후 실행하여 덮어쓰기
    - cron: '0 18 * * *'
  workflow_dispatch: {}

jobs:
  predict:
    name: Chronos 예측 (전체 단지 × 4 버킷)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: HuggingFace 모델 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: chronos-bolt-small-v1

      - name: PyTorch (CPU) + Chronos 설치
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "chronos-forecasting>=2.0" requests numpy

      - name: Chronos 예측 실행
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/compute-predictions-ai.py
