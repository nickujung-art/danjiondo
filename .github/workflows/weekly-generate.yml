name: Weekly Card News Generation

on:
  schedule:
    # 매주 월요일 00:10 KST (일요일 15:10 UTC)
    - cron: '10 15 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (HTML only, no PNG)'
        type: boolean
        default: false
      series:
        description: 'Specific series IDs (comma-separated, leave empty for all)'
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card-news

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: card-news/package-lock.json

      - name: Install Chromium system dependencies
        run: sudo apt-get install -y libgbm-dev libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Cache Pretendard fonts
        uses: actions/cache@v4
        with:
          path: card-news/fonts
          key: pretendard-1.3.9

      - name: Download Pretendard fonts
        run: node scripts/setup.js

      - name: Generate card news
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.series }}" ]; then ARGS="$ARGS --series=${{ inputs.series }}"; fi
          node scripts/generate.js $ARGS

      - name: Upload PNG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: card-news-${{ github.run_id }}
          path: card-news/output/
          retention-days: 30
