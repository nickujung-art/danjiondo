name: Weekly Card News Generation

on:
  schedule:
    # 매주 월요일 00:10 KST (일요일 15:10 UTC)
    - cron: '10 15 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (HTML only, no PNG)'
        type: boolean
        default: false
      series:
        description: 'Specific series IDs (comma-separated, leave empty for all)'
        type: string
        default: ''
      post_instagram:
        description: 'Post to Instagram after generation (수동 실행 시만 체크 — cron은 자동 포스팅 안 함)'
        type: boolean
        default: false
      instagram_series:
        description: 'Instagram series to post (comma-separated, leave empty for city-overall only)'
        type: string
        default: 'city-overall'

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card-news

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: card-news/package-lock.json

      - name: Install Chromium system dependencies
        run: sudo apt-get install -y libgbm-dev libxss1 libasound2t64 libatk-bridge2.0-0 libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Cache Pretendard fonts
        uses: actions/cache@v4
        with:
          path: card-news/fonts
          key: pretendard-1.3.9

      - name: Download Pretendard fonts
        run: node scripts/setup.js

      - name: Generate card news
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.series }}" ]; then ARGS="$ARGS --series=${{ inputs.series }}"; fi
          node scripts/generate.js $ARGS

      - name: Upload PNG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: card-news-${{ github.run_id }}
          path: card-news/output/
          retention-days: 30

      # ⚠️  Instagram 자동 포스팅은 cron에서 실행되지 않음.
      #     workflow_dispatch에서 post_instagram 체크박스를 켜야만 실행됨.
      - name: Post to Instagram
        if: ${{ inputs.post_instagram == true }}
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_INSTAGRAM_ACCOUNT_ID: ${{ secrets.META_INSTAGRAM_ACCOUNT_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
        run: |
          WEEK=$(ls -1 output/ | sort | tail -1)
          SERIES="${{ inputs.instagram_series }}"
          if [ -z "$SERIES" ]; then SERIES="city-overall"; fi
          echo "게시 주차: $WEEK / 시리즈: $SERIES"
          node scripts/post-instagram.js --week=$WEEK --series=$SERIES
