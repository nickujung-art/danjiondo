name: DB Backup

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    name: pg_dump -> GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install postgresql-client-17
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump
        run: |
          set -e
          FILENAME="backup-$(date +%Y-%m-%d).sql.gz"
          export PGCONNECT_TIMEOUT=60
          export PGPASSWORD="BdsBackup2026!"
          /usr/lib/postgresql/17/bin/pg_dump \
            --host=aws-1-ap-southeast-2.pooler.supabase.com \
            --port=5432 \
            --username=backup_agent.auoravdadyzvuoxunogh \
            --dbname=postgres \
            --no-password \
            --no-owner \
            --no-privileges \
          2>&1 | gzip > "/tmp/$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          DUMP_SIZE=$(wc -c < "/tmp/$FILENAME")
          echo "pg_dump complete: $DUMP_SIZE bytes"
          if [ "$DUMP_SIZE" -lt 10000 ]; then
            echo "ERROR: dump too small" >&2; exit 1
          fi

      - name: Upload to GitHub Release (db-backups)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Create or get existing release tag "db-backups"
          if ! gh release view db-backups --repo ${{ github.repository }} > /dev/null 2>&1; then
            gh release create db-backups \
              --repo ${{ github.repository }} \
              --title "DB Backups" \
              --notes "Automated weekly database backups" \
              --prerelease
          fi
          # Upload backup file
          gh release upload db-backups "/tmp/$FILENAME" \
            --repo ${{ github.repository }} \
            --clobber
          echo "Uploaded $FILENAME to release db-backups"

      - name: Cleanup backups older than 90 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -d '90 days ago' +%Y-%m-%d)
          gh release view db-backups --repo ${{ github.repository }} --json assets \
            --jq ".assets[] | select(.name | test(\"backup-\")) | select(.name | ltrimstr(\"backup-\") | rtrimstr(\".sql.gz\") < \"$CUTOFF\") | .name" \
          | while read -r OLD_FILE; do
            gh release delete-asset db-backups "$OLD_FILE" \
              --repo ${{ github.repository }} --yes || true
            echo "Deleted old backup: $OLD_FILE"
          done
