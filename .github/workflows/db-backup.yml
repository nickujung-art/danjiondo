name: DB Backup

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump -> danjiondo-backup repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Diagnose connections
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PW=$(python3 -c "import os,urllib.parse; u=urllib.parse.urlparse(os.environ['SUPABASE_DB_URL']); print(u.password)")
          JWT="$SUPABASE_SERVICE_ROLE_KEY"
          HOST="aws-1-ap-southeast-2.pooler.supabase.com"
          USER_FULL="postgres.auoravdadyzvuoxunogh"
          export PGCONNECT_TIMEOUT=10

          echo "=== Session Pooler 5432 + DB pw ==="
          PGPASSWORD="$PW" psql "postgresql://${USER_FULL}@${HOST}:5432/postgres" --no-password -c "SELECT 'OK'" 2>&1 || true

          echo "=== Transaction Pooler 6543 + DB pw ==="
          PGPASSWORD="$PW" psql "postgresql://${USER_FULL}@${HOST}:6543/postgres" --no-password -c "SELECT 'OK'" 2>&1 || true

          echo "=== Session Pooler 5432 + JWT ==="
          PGPASSWORD="$JWT" psql "postgresql://${USER_FULL}@${HOST}:5432/postgres" --no-password -c "SELECT 'OK'" 2>&1 || true

          echo "=== Transaction Pooler 6543 + JWT ==="
          PGPASSWORD="$JWT" psql "postgresql://${USER_FULL}@${HOST}:6543/postgres" --no-password -c "SELECT 'OK'" 2>&1 || true
