name: DB Backup

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump -> danjiondo-backup repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Diagnose connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          # Show URL structure (masked password)
          python3 - << 'PYEOF'
import os, urllib.parse

url = os.environ['SUPABASE_DB_URL']
print(f"URL length: {len(url)}")

# Method 1: urlparse
u = urllib.parse.urlparse(url)
print(f"urlparse host: {u.hostname}")
print(f"urlparse user: {u.username}")
print(f"urlparse password length: {len(u.password) if u.password else 'None'}")
print(f"urlparse password first2: {(u.password[:2] + '***') if u.password else 'None'}")

# Method 2: rsplit
after_scheme = url.split('://', 1)[1]
userpass = after_scheme.rsplit('@', 1)[0]
host_part = after_scheme.rsplit('@', 1)[1]
pw_raw = userpass.split(':', 1)[1]
pw_decoded = urllib.parse.unquote(pw_raw)
print(f"rsplit method password length: {len(pw_decoded)}")
print(f"rsplit method password first2: {pw_decoded[:2] + '***'}")
print(f"host from rsplit: {host_part.split(':')[0]}")
print(f"@ count in URL: {url.count('@')}")
PYEOF

      - name: Test psql connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          export PGPASSWORD=$(python3 -c "
import os, urllib.parse
url = os.environ['SUPABASE_DB_URL']
up = url.split('://', 1)[1].rsplit('@', 1)[0]
pw = up.split(':', 1)[1]
print(urllib.parse.unquote(pw))
")
          echo "Testing psql connection to Session Pooler..."
          psql \
            --host=aws-1-ap-southeast-2.pooler.supabase.com \
            --port=5432 \
            --username=postgres.auoravdadyzvuoxunogh \
            --dbname=postgres \
            --no-password \
            -c "SELECT count(*) FROM pg_tables WHERE schemaname='public';" 2>&1 || echo "psql failed with exit $?"

      - name: Run pg_dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          FILENAME="backup-$(date +%Y-%m-%d).sql.gz"
          export PGPASSWORD=$(python3 -c "
import os, urllib.parse
url = os.environ['SUPABASE_DB_URL']
up = url.split('://', 1)[1].rsplit('@', 1)[0]
pw = up.split(':', 1)[1]
print(urllib.parse.unquote(pw))
")
          pg_dump \
            --host=aws-1-ap-southeast-2.pooler.supabase.com \
            --port=5432 \
            --username=postgres.auoravdadyzvuoxunogh \
            --dbname=postgres \
            --no-password \
          | gzip > "/tmp/$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          echo "pg_dump complete: $FILENAME"

      - name: Verify dump file integrity
        run: |
          set -e
          DUMP_SIZE=$(wc -c < "/tmp/$FILENAME")
          echo "Dump file size: $DUMP_SIZE bytes"
          if [ "$DUMP_SIZE" -lt 1000 ]; then
            echo "ERROR: dump file too small ($DUMP_SIZE bytes)" >&2
            exit 1
          fi
          echo "Dump integrity OK: $DUMP_SIZE bytes"

      - name: Clone backup repo
        env:
          BACKUP_PAT: ${{ secrets.BACKUP_PAT }}
        run: |
          set -e
          git clone \
            "https://x-access-token:${BACKUP_PAT}@github.com/nickujung-art/danjiondo-backup.git" \
            /tmp/backup-repo

      - name: Commit backup file
        run: |
          set -e
          cp "/tmp/$FILENAME" /tmp/backup-repo/
          cd /tmp/backup-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$FILENAME"
          git commit -m "backup: $FILENAME"
          git push

      - name: Cleanup backups older than 90 days
        run: |
          set -e
          cd /tmp/backup-repo
          CUTOFF=$(date -d '90 days ago' +%Y-%m-%d)
          REMOVED=0
          for f in backup-*.sql.gz; do
            [ -f "$f" ] || continue
            FILEDATE="${f#backup-}"
            FILEDATE="${FILEDATE%.sql.gz}"
            if [[ "$FILEDATE" < "$CUTOFF" ]]; then
              git rm "$f"
              REMOVED=$((REMOVED + 1))
            fi
          done
          if [ "$REMOVED" -gt 0 ]; then
            git commit -m "cleanup: remove $REMOVED backup(s) older than 90 days"
            git push
            echo "Removed $REMOVED old backup(s)"
          else
            echo "No old backups to remove"
          fi
