name: DB Backup

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump -> danjiondo-backup repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Diagnose all connection methods
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PW=$(python3 -c "import os,urllib.parse; u=urllib.parse.urlparse(os.environ['SUPABASE_DB_URL']); print(u.password)")
          JWT="$SUPABASE_SERVICE_ROLE_KEY"
          HOST_SESSION="aws-1-ap-southeast-2.pooler.supabase.com"
          USER_FULL="postgres.auoravdadyzvuoxunogh"

          echo "=== Session Pooler (5432) + DB password ==="
          PGPASSWORD="$PW" psql --host="$HOST_SESSION" --port=5432 --username="$USER_FULL" --dbname=postgres --no-password --connect-timeout=10 -c "SELECT 1" 2>&1 || true

          echo "=== Transaction Pooler (6543) + DB password ==="
          PGPASSWORD="$PW" psql --host="$HOST_SESSION" --port=6543 --username="$USER_FULL" --dbname=postgres --no-password --connect-timeout=10 -c "SELECT 1" 2>&1 || true

          echo "=== Session Pooler (5432) + JWT ==="
          PGPASSWORD="$JWT" psql --host="$HOST_SESSION" --port=5432 --username="$USER_FULL" --dbname=postgres --no-password --connect-timeout=10 -c "SELECT 1" 2>&1 || true

          echo "=== Transaction Pooler (6543) + JWT ==="
          PGPASSWORD="$JWT" psql --host="$HOST_SESSION" --port=6543 --username="$USER_FULL" --dbname=postgres --no-password --connect-timeout=10 -c "SELECT 1" 2>&1 || true

          echo "=== Session Pooler (5432) + plain 'postgres' username + DB pw ==="
          PGPASSWORD="$PW" psql --host="$HOST_SESSION" --port=5432 --username="postgres" --dbname=postgres --no-password --connect-timeout=10 -c "SELECT 1" 2>&1 || true
