name: DB Backup

on:
  schedule:
    - cron: '0 19 * * 6'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump -> danjiondo-backup repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install postgresql-client-17
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump 17
        run: |
          set -e
          FILENAME="backup-$(date +%Y-%m-%d).sql.gz"
          export PGCONNECT_TIMEOUT=60
          export PGPASSWORD="BdsBackup2026!"
          /usr/lib/postgresql/17/bin/pg_dump \
            --host=aws-1-ap-southeast-2.pooler.supabase.com \
            --port=5432 \
            --username=backup_agent.auoravdadyzvuoxunogh \
            --dbname=postgres \
            --no-password \
            --no-owner \
            --no-privileges \
          | gzip > "/tmp/$FILENAME"
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          DUMP_SIZE=$(wc -c < "/tmp/$FILENAME")
          echo "pg_dump complete: $DUMP_SIZE bytes"

      - name: Verify dump
        run: |
          set -e
          DUMP_SIZE=$(wc -c < "/tmp/$FILENAME")
          if [ "$DUMP_SIZE" -lt 10000 ]; then
            echo "ERROR: dump too small ($DUMP_SIZE bytes)" >&2
            exit 1
          fi
          echo "OK: $DUMP_SIZE bytes"

      - name: Clone backup repo
        env:
          BACKUP_PAT: ${{ secrets.BACKUP_PAT }}
        run: |
          set -e
          git clone "https://x-access-token:${BACKUP_PAT}@github.com/nickujung-art/danjiondo-backup.git" /tmp/backup-repo

      - name: Commit backup
        run: |
          set -e
          cp "/tmp/$FILENAME" /tmp/backup-repo/
          cd /tmp/backup-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$FILENAME"
          git commit -m "backup: $FILENAME"
          git push

      - name: Cleanup backups older than 90 days
        run: |
          set -e
          cd /tmp/backup-repo
          CUTOFF=$(date -d '90 days ago' +%Y-%m-%d)
          REMOVED=0
          for f in backup-*.sql.gz; do
            [ -f "$f" ] || continue
            FILEDATE="${f#backup-}"
            FILEDATE="${FILEDATE%.sql.gz}"
            if [[ "$FILEDATE" < "$CUTOFF" ]]; then
              git rm "$f"
              REMOVED=$((REMOVED + 1))
            fi
          done
          if [ "$REMOVED" -gt 0 ]; then
            git commit -m "cleanup: remove $REMOVED backup(s) older than 90 days"
            git push
          fi
